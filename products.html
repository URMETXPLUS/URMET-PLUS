<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Products - URMET PLUS</title>
    
    <style>
        /* --- 1. 字體與基礎設定 --- */
        @font-face {
            font-family: 'Bariol Bold';
            src: url('fonts/Bariol-Bold.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050c1a;
            color: white;
            font-family: 'Bariol Bold', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 2. Header (保留原有樣式) --- */
        header {
            width: 100%; 
            padding: 12px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: fixed; 
            top: 0; 
            left: 0; 
            background: radial-gradient(circle at 60% 40%, #1e4b8a 0%, #0a1931 50%, #050c1a 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .logo img { height: 40px; width: auto; transform: translateX(-38px); }
        .nav-wrapper { display: flex; align-items: center; gap: 30px; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav a { text-decoration: none; color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; color: #60a5fa; }
        .lang-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        /* --- 3. 星空背景與 3D 展現區 --- */
        .stars-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px; /* 控制 3D 距離感 */
        }

        /* 簡單的星空點綴效果 */
        .stars-container::before {
            content: "";
            position: absolute;
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 10vw 20vh #fff, 30vw 50vh #fff, 70vw 10vh #fff, 85vw 80vh #fff, 40vw 90vh #fff, 15vw 40vh #fff;
            animation: starFlicker 3s infinite alternate;
        }

        @keyframes starFlicker {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        /* 3D 旋轉舞台 */
        .stage {
            width: 400px;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            /* 關鍵：傾斜視角 (側面看圓圈) */
            transform: rotateX(-15deg) rotateY(0deg);
        }

        /* 旋轉動畫 */
        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotateCarousel 20s linear infinite;
        }

        @keyframes rotateCarousel {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .product-card {
            position: absolute;
            width: 280px;
            height: 180px;
            left: 50%;
            top: 50%;
            margin-left: -140px;
            margin-top: -90px;
            transform-style: preserve-3d;
        }

        /* 四張圖片的位置佈局：半徑 450px */
        .p1 { transform: rotateY(0deg) translateZ(450px); }
        .p2 { transform: rotateY(90deg) translateZ(450px); }
        .p3 { transform: rotateY(180deg) translateZ(450px); }
        .p4 { transform: rotateY(270deg) translateZ(450px); }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: rgba(10, 25, 49, 0.6);
            border: 2px solid #007aff;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.4), inset 0 0 15px rgba(0, 122, 255, 0.2);
            /* 反向旋轉：讓圖片永遠面向觀眾 */
            animation: keepFacing 20s linear infinite;
            transition: transform 0.3s ease;
        }

        .product-card:hover img {
            border-color: #60a5fa;
            box-shadow: 0 0 50px rgba(96, 165, 250, 0.8);
        }

        @keyframes keepFacing {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(-360deg); }
        }

        /* --- 4. Footer (保留原有樣式) --- */
        footer { 
            background: radial-gradient(circle at 60% 40%, #1e4b8a 0%, #0a1931 50%, #050c1a 100%);
            padding: 80px 8% 40px 8%; 
            color: white; 
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .footer-section h4 { color: #60a5fa; margin-bottom: 20px; font-size: 18px; text-transform: uppercase; }
        .footer-section p, .footer-section a { color: rgba(255,255,255,0.7); text-decoration: none; display: block; margin-bottom: 10px; font-size: 15px; }
        .copyright { text-align: center; padding-top: 60px; color: rgba(255,255,255,0.3); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px; }

        @media (max-width: 768px) {
            .logo img { transform: none; }
            header nav { display: none; }
            .p1, .p2, .p3, .p4 { translateZ(250px); } /* 手機版縮小半徑 */
            .product-card { width: 200px; height: 130px; margin-left: -100px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Urmet Logo">
        </div>
        <div class="nav-wrapper">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">About Us</a></li>
                </ul>
            </nav>
            <div class="lang-container">
                <button class="lang-btn">LANGUAGE ▾</button>
            </div>
        </div>
    </header>

    <main class="stars-container">
        <div class="stage">
            <div class="carousel">
                <div class="product-card p1">
                    <img src="product1.png" alt="Product 1">
                </div>
                <div class="product-card p2">
                    <img src="product2.png" alt="Product 2">
                </div>
                <div class="product-card p3">
                    <img src="product3.png" alt="Product 3">
                </div>
                <div class="product-card p4">
                    <img src="product4.png" alt="Product 4">
                </div>
            </div>
        </div>

        <div style="position: absolute; bottom: 10%; text-align: center; width: 100%;">
            <h2 style="letter-spacing: 5px; opacity: 0.6; font-size: 24px;">PRODUCT SHOWCASE</h2>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="logo.png" alt="Logo" style="height: 35px; margin-bottom: 20px;">
                <p>香港柴灣永泰道60號<br>柴灣工業城一期7期11-14室</p>
            </div>
            <div class="footer-section">
                <h4>Contact Us</h4>
                <a href="#">Help Desk</a>
                <a href="privacy.html">Privacy Policy</a>
                <a href="#">Terms of Service</a>
            </div>
        </div>
        <div class="copyright">
            <p>© 2026 URMET JES LIMITED - ALL RIGHTS RESERVED</p>
        </div>
    </footer>

</body>
</html>
