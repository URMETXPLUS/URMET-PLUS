<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Products - URMET PLUS</title>
    
    <style>
        /* --- 1. 字體與基礎設定 --- */
        @font-face { font-family: 'Bariol Bold'; src: url('fonts/Bariol-Bold.woff2') format('woff2'); }
        @font-face { font-family: 'Aptos Bold'; src: url('fonts/Aptos-Bold.woff2') format('woff2'); font-weight: bold; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(to bottom, #000000 0%, #050c1a 50%, #102a4d 100%);
            color: white;
            font-family: 'Bariol Bold', sans-serif;
            overflow-x: hidden;
        }

        /* --- 2. Header (深藍風格) --- */
        header {
            width: 100%; padding: 15px 8%; 
            display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; left: 0; 
            background: rgba(5, 12, 26, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(96, 165, 250, 0.3);
        }

        .logo img { height: 40px; }
        .nav-wrapper { display: flex; align-items: center; gap: 30px; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav a { text-decoration: none; color: white; font-size: 14px; text-transform: uppercase; opacity: 0.8; }
        nav a:hover { color: #60a5fa; }

        /* --- 3. 3D 展示區 --- */
        .stars-container {
            position: relative;
            width: 100%; height: 95vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 2500px;
            padding-top: 100px;
        }

        /* --- 4. 舞台與托盤鋼環 --- */
        .stage {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            display: flex; justify-content: center; align-items: center;
        }

        .orbit-ring {
            position: absolute;
            width: 800px; height: 800px;
            border: 6px solid #4a4a4a;
            border-radius: 50%;
            /* 關鍵：傾斜並托在相片群下方 */
            transform: rotateX(85deg) translateZ(-250px); 
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.2);
            pointer-events: none;
        }

        .carousel { transform-style: preserve-3d; animation: rotateCarousel 25s linear infinite; }
        @keyframes rotateCarousel { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .product-card {
            position: absolute;
            width: 280px;
            left: 50%; top: 45%; /* 稍微置中偏上 */
            margin-left: -140px; margin-top: -120px;
            text-align: center;
        }

        .p1 { transform: rotateY(0deg) translateZ(400px); }
        .p2 { transform: rotateY(72deg) translateZ(400px); }
        .p3 { transform: rotateY(144deg) translateZ(400px); }
        .p4 { transform: rotateY(216deg) translateZ(400px); }
        .p5 { transform: rotateY(288deg) translateZ(400px); }

        .product-card img { width: 100%; animation: billboardCounter 25s linear infinite; }
        
        /* Aptos 粗體發光字 */
        .product-label {
            margin-top: 15px;
            font-family: 'Aptos Bold', sans-serif;
            font-size: 18px;
            color: #ffffff;
            text-shadow: 0 0 8px #fff, 0 0 15px #60a5fa;
            animation: billboardCounter 25s linear infinite;
        }

        @keyframes billboardCounter { from { transform: rotateY(0deg); } to { transform: rotateY(-360deg); } }
        .p1 img, .p1 .product-label { animation-delay: 0s; }
        .p2 img, .p2 .product-label { animation-delay: -5s; }
        .p3 img, .p3 .product-label { animation-delay: -10s; }
        .p4 img, .p4 .product-label { animation-delay: -15s; }
        .p5 img, .p5 .product-label { animation-delay: -20s; }

        /* --- 5. Footer (深藍風格) --- */
        footer { 
            background: rgba(5, 12, 26, 1); 
            padding: 60px 8%; 
            border-top: 1px solid rgba(96, 165, 250, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="logo.png" alt="Urmet Logo"></div>
        <div class="nav-wrapper">
            <nav><ul><li><a href="index.html">Home</a></li><li><a href="products.html">Products</a></li><li><a href="about.html">About Us</a></li></ul></nav>
        </div>
    </header>

    <main class="stars-container">
        <div class="stage">
            <div class="orbit-ring"></div>
            <div class="carousel">
                <div class="product-card p1"><img src="product1.png"><div class="product-label">QR Code Access</div></div>
                <div class="product-card p2"><img src="product2.png"><div class="product-label">Invitation</div></div>
                <div class="product-card p3"><img src="product3.png"><div class="product-label">Facility Booking</div></div>
                <div class="product-card p4"><img src="product4.png"><div class="product-label">URMET PLUS</div></div>
                <div class="product-card p5"><img src="product5.png"><div class="product-label">Panic Alarm</div></div>
            </div>
        </div>
    </main>

    <footer>
        <div style="text-align: center; color: white;">© 2026 URMET JES LIMITED - ALL RIGHTS RESERVED</div>
    </footer>

</body>
</html>
