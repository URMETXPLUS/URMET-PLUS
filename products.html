<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Products - URMET PLUS</title>
    
    <style>
        /* --- 1. 字體與基礎設定 --- */
        @font-face {
            font-family: 'Bariol Bold';
            src: url('fonts/Bariol-Bold.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050c1a;
            color: white;
            font-family: 'Bariol Bold', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 2. Header --- */
        header {
            width: 100%; 
            padding: 12px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: fixed; 
            top: 0; 
            left: 0; 
            background: radial-gradient(circle at 60% 40%, #1e4b8a 0%, #0a1931 50%, #050c1a 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .logo img { height: 40px; width: auto; display: block; transform: translateX(-38px); }
        .nav-wrapper { display: flex; align-items: center; gap: 30px; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav a { text-decoration: none; color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; color: #60a5fa; }
        .lang-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        /* --- 3. 3D 展示區 (深藍漸變背景) --- */
        .stars-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at center, #102a4d 0%, #050c1a 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        .stage {
            width: 400px;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
        }

        /* 旋轉容器 - 速度加快至 15s */
        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotateCarousel 15s linear infinite;
        }

        @keyframes rotateCarousel {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .product-card {
            position: absolute;
            width: 420px;
            height: 280px;
            left: 50%;
            top: 50%;
            margin-left: -210px;
            margin-top: -140px;
            transform-style: preserve-3d;
        }

        /* 3D 佈局：均勻分佈在圓周上 */
        .p1 { transform: rotateY(0deg) translateZ(350px); }
        .p2 { transform: rotateY(90deg) translateZ(350px); }
        .p3 { transform: rotateY(180deg) translateZ(350px); }
        .p4 { transform: rotateY(270deg) translateZ(350px); }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent;
            /* 核心修正：與容器旋轉方向相反，確保正面對觀眾 */
            animation: keepFacing 15s linear infinite;
            transition: transform 0.4s ease;
        }

        /* 滑鼠懸停依然保有放大效果，但不會停下旋轉 */
        .product-card:hover img {
            transform: scale(1.15);
            z-index: 100;
        }

        @keyframes keepFacing {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(-360deg); }
        }

        /* --- 4. Demo Section --- */
        .demo-section {
            background: #050c1a;
            padding: 80px 8%;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .demo-section h3 {
            font-size: 28px;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
            color: #60a5fa;
        }

        .demo-btn {
            display: inline-block;
            padding: 12px 35px;
            border: 1px solid #60a5fa;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }

        .demo-btn:hover {
            background: #60a5fa;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.5);
        }

        /* --- 5. Footer (完全還原) --- */
        footer { 
            background: radial-gradient(circle at 60% 40%, #1e4b8a 0%, #0a1931 50%, #050c1a 100%);
            padding: 80px 8% 40px 8%; 
            color: white; 
        }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .footer-section h4 { color: #60a5fa; margin-bottom: 20px; font-size: 18px; text-transform: uppercase; }
        .footer-section p, .footer-section a { color: rgba(255,255,255,0.7); text-decoration: none; display: block; margin-bottom: 10px; font-size: 15px; }
        .footer-section a:hover { color: white; }
        .copyright { text-align: center; padding-top: 60px; color: rgba(255,255,255,0.3); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px; }

        @media (max-width: 768px) {
            .logo img { transform: none; }
            header nav { display: none; }
            .product-card { width: 300px; height: 200px; margin-left: -150px; }
            /* 行動裝置縮短半徑 */
            .p1 { transform: rotateY(0deg) translateZ(220px); }
            .p2 { transform: rotateY(90deg) translateZ(220px); }
            .p3 { transform: rotateY(180deg) translateZ(220px); }
            .p4 { transform: rotateY(270deg) translateZ(220px); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Urmet Logo">
        </div>
        <div class="nav-wrapper">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">About Us</a></li>
                </ul>
            </nav>
            <div class="lang-container">
                <button class="lang-btn">LANGUAGE ▾</button>
            </div>
        </div>
    </header>

    <main class="stars-container">
        <div class="stage">
            <div class="carousel">
                <div class="product-card p1">
                    <img src="product1.png" alt="Product 1">
                </div>
                <div class="product-card p2">
                    <img src="product2.png" alt="Product 2">
                </div>
                <div class="product-card p3">
                    <img src="product3.png" alt="Product 3">
                </div>
                <div class="product-card p4">
                    <img src="product4.png" alt="Product 4">
                </div>
            </div>
        </div>
    </main>

    <section class="demo-section">
        <h3>如有興趣，歡迎找我們做 demo</h3>
        <a href="mailto:info@urmet.com.hk" class="demo-btn">Book a Demo</a>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="logo.png" alt="Logo" style="height: 35px; margin-bottom: 20px;">
                <p>香港柴灣永泰道60號<br>柴灣工業城一期7期11-14室</p>
            </div>
            <div class="footer-section">
                <h4>Contact Us</h4>
                <a href="#">Help Desk</a>
                <a href="privacy.html">Privacy Policy</a>
                <a href="#">Terms of Service</a>
            </div>
        </div>
        <div class="copyright">
            <p>© 2026 URMET JES LIMITED - ALL RIGHTS RESERVED</p>
        </div>
    </footer>

</body>
</html>
