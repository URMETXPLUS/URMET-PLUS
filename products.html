<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Products - URMET PLUS</title>
    
    <style>
        /* --- 1. 基礎設定與字體 --- */
        @font-face {
            font-family: 'Bariol Bold';
            src: url('fonts/Bariol-Bold.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* 背景：從上方深黑漸變到下方深藍 */
            background: linear-gradient(to bottom, #000000 0%, #050c1a 50%, #102a4d 100%);
            color: white;
            font-family: 'Bariol Bold', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 2. Header --- */
        header {
            width: 100%; 
            padding: 12px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: fixed; 
            top: 0; 
            left: 0; 
            background: rgba(5, 12, 26, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            border-bottom: 1px solid rgba(96, 165, 250, 0.3);
        }

        .logo img { height: 40px; width: auto; display: block; transform: translateX(-38px); }
        .nav-wrapper { display: flex; align-items: center; gap: 30px; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav a { text-decoration: none; color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; color: #60a5fa; }
        .lang-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.3s; }

        /* --- 3. Cyberpunk 背景與 3D 展示區 (已上移) --- */
        .stars-container {
            position: relative;
            width: 100%;
            height: 85vh; /* 縮小容器高度，讓內容在視覺上上移 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2500px;
            padding-top: 100px; /* 為 fixed header 留白 */
        }

        .stars-container::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 250px 250px;
            opacity: 0.2;
            z-index: 0;
        }

        /* --- 4. 3D 舞台與軌道設定 --- */
        .stage {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        /* 鋼鐵軌跡環 (按比例放置在相片轉動下方) */
        .orbit-ring {
            position: absolute;
            width: 720px; /* 對應 350px 旋轉半徑 */
            height: 720px;
            border: 5px solid #4a4a4a; /* 鋼鐵灰 */
            border-radius: 50%;
            /* 關鍵：傾斜視角並下移 z 軸，使其位於底部 */
            transform: rotateX(82deg) translateZ(-140px); 
            box-shadow: 
                0 0 15px rgba(0, 0, 0, 0.8),
                inset 0 0 10px rgba(255, 255, 255, 0.1),
                0 0 30px rgba(96, 165, 250, 0.15);
            z-index: 1;
            pointer-events: none;
        }

        /* 旋轉容器 (25秒慢速) */
        .carousel {
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCarousel 25s linear infinite;
        }

        @keyframes rotateCarousel {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .product-card {
            position: absolute;
            width: 220px; /* 圖片縮小一些 */
            left: 50%;
            /* 將 top 位置從 50% 移至 45%，使相片移高 */
            top: 45%; 
            margin-left: -110px;
            margin-top: -110px;
            transform-style: preserve-3d;
            text-align: center;
        }

        /* 5個位置 */
        .p1 { transform: rotateY(0deg) translateZ(350px); }
        .p2 { transform: rotateY(72deg) translateZ(350px); }
        .p3 { transform: rotateY(144deg) translateZ(350px); }
        .p4 { transform: rotateY(216deg) translateZ(350px); }
        .p5 { transform: rotateY(288deg) translateZ(350px); }

        .product-card img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(96, 165, 250, 0.4));
            /* 核心：反向旋轉動畫保持正面 */
            animation: billboardCounter 25s linear infinite;
            transition: 0.3s;
        }

        /* --- 文字標籤修訂：發光的白色 --- */
        .product-label {
            margin-top: 10px;
            font-size: 16px;
            color: #ffffff; /* 改為白色 */
            /* 新增：白色 neon 發光效果 */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 15px #fff,
                0 0 20px #fff,
                0 0 35px #fff;
            letter-spacing: 0.5px;
            white-space: nowrap;
            animation: billboardCounter 25s linear infinite;
        }

        /* 核心正面技術 */
        @keyframes billboardCounter {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(-360deg); }
        }

        /* 動畫延遲補償 */
        .p1 img, .p1 .product-label { animation-delay: 0s; }
        .p2 img, .p2 .product-label { animation-delay: -5s; }
        .p3 img, .p3 .product-label { animation-delay: -10s; }
        .p4 img, .p4 .product-label { animation-delay: -15s; }
        .p5 img, .p5 .product-label { animation-delay: -20s; }

        /* --- 5. Demo & Footer (保持) --- */
        .demo-section {
            background: #000;
            padding: 60px 8%;
            text-align: center;
            border-top: 1px solid rgba(96, 165, 250, 0.2);
        }

        .demo-btn {
            display: inline-block;
            padding: 12px 35px;
            border: 1px solid #60a5fa;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .demo-btn:hover { background: #60a5fa; box-shadow: 0 0 20px rgba(96, 165, 250, 0.6); }

        footer { background: #000; padding: 40px 8%; color: white; border-top: 1px solid rgba(255,255,255,0.1); }
        .footer-content { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 30px; }
        .footer-section h4 { color: #60a5fa; margin-bottom: 15px; }
        .footer-section p { color: rgba(255,255,255,0.6); font-size: 14px; }
        .copyright { text-align: center; margin-top: 30px; color: rgba(255,255,255,0.3); font-size: 11px; }

        /* 手機端適應 */
        @media (max-width: 768px) {
            .stars-container { height: 70vh; padding-top: 80px; }
            .orbit-ring { width: 450px; height: 450px; transform: rotateX(80deg) translateZ(-100px); }
            .p1, .p2, .p3, .p4, .p5 { transform: rotateY(var(--angle)) translateZ(220px); }
            .product-card { width: 150px; top: 40%; }
            .product-label { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="logo.png" alt="Urmet Logo"></div>
        <div class="nav-wrapper">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">About Us</a></li>
                </ul>
            </nav>
            <button class="lang-btn">LANGUAGE ▾</button>
        </div>
    </header>

    <main class="stars-container">
        <div class="stage">
            <div class="orbit-ring"></div>

            <div class="carousel">
                <div class="product-card p1">
                    <img src="product1.png" alt="QR Code Access Control">
                    <div class="product-label">QR Code Access Control</div>
                </div>
                <div class="product-card p2">
                    <img src="product2.png" alt="Invitation">
                    <div class="product-label">Invitation</div>
                </div>
                <div class="product-card p3">
                    <img src="product3.png" alt="Facility Booking">
                    <div class="product-label">Facility Booking</div>
                </div>
                <div class="product-card p4">
                    <img src="product4.png" alt="URMET PLUS">
                    <div class="product-label">URMET PLUS</div>
                </div>
                <div class="product-card p5">
                    <img src="product5.png" alt="Panic Alarm">
                    <div class="product-label">Panic Alarm</div>
                </div>
            </div>
        </div>
    </main>

    <section class="demo-section">
        <h3 style="margin-bottom: 20px;">如有興趣，歡迎找我們做 demo</h3>
        <a href="mailto:info@urmet.com.hk" class="demo-btn">Book a Demo</a>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="logo.png" alt="Logo" style="height: 30px; margin-bottom: 15px;">
                <p>香港柴灣永泰道60號<br>柴灣工業城一期7期11-14室</p>
            </div>
            <div class="footer-section">
                <h4>Contact Us</h4>
                <p>Email: info@urmet.com.hk</p>
                <p>Tel: +852 2388 2388</p>
            </div>
        </div>
        <div class="copyright">
            <p>© 2026 URMET JES LIMITED - ALL RIGHTS RESERVED</p>
        </div>
    </footer>

</body>
</html>
