<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Products - URMET PLUS</title>
    
    <style>
        /* --- 1. 基礎設定與字體 --- */
        @font-face {
            font-family: 'Bariol Bold';
            src: url('fonts/Bariol-Bold.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* 背景：從上方深黑漸變到下方深藍 */
            background: linear-gradient(to bottom, #000000 0%, #050c1a 50%, #102a4d 100%);
            color: white;
            font-family: 'Bariol Bold', sans-serif;
            overflow-x: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 2. Header --- */
        header {
            width: 100%; 
            padding: 12px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: fixed; 
            top: 0; 
            left: 0; 
            background: rgba(5, 12, 26, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            border-bottom: 1px solid rgba(96, 165, 250, 0.3);
        }

        .logo img { height: 40px; width: auto; display: block; transform: translateX(-38px); }
        .nav-wrapper { display: flex; align-items: center; gap: 30px; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav a { text-decoration: none; color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; color: #60a5fa; }
        .lang-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.3s; }

        /* --- 3. Cyberpunk 星空背景 --- */
        .stars-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2500px;
        }

        /* 偽元素生成星點 */
        .stars-container::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
            z-index: 0;
        }

        /* --- 4. 3D 舞台與鋼鐵軌跡環 --- */
        .stage {
            width: 600px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            z-index: 2;
        }

        /* 實體化軌跡環 (3D 灰色鋼鐵感) */
        .orbit-ring {
            position: absolute;
            width: 850px;
            height: 850px;
            border: 6px solid #4a4a4a; /* 鋼鐵灰 */
            border-radius: 50%;
            top: 50%;
            left: 50%;
            margin-left: -425px;
            margin-top: -425px;
            transform: rotateX(80deg); /* 平躺 */
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                inset 0 0 15px rgba(255, 255, 255, 0.1),
                0 0 40px rgba(96, 165, 250, 0.2); /* 微微發藍光 */
            z-index: 1;
        }

        /* 旋轉容器 (25秒慢速) */
        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotateCarousel 25s linear infinite;
        }

        @keyframes rotateCarousel {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .product-card {
            position: absolute;
            width: 280px;
            left: 50%;
            top: 50%;
            margin-left: -140px;
            margin-top: -140px;
            transform-style: preserve-3d;
            text-align: center;
        }

        /* 5個位置計算 (360/5 = 72度) */
        .p1 { transform: rotateY(0deg) translateZ(400px); }
        .p2 { transform: rotateY(72deg) translateZ(400px); }
        .p3 { transform: rotateY(144deg) translateZ(400px); }
        .p4 { transform: rotateY(216deg) translateZ(400px); }
        .p5 { transform: rotateY(288deg) translateZ(400px); }

        /* --- 圖片與標籤 --- */
        .product-card img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.5));
            transition: transform 0.4s ease;
            /* 反向旋轉動畫 */
            animation: billboardCounter 25s linear infinite;
        }

        .product-label {
            margin-top: 15px;
            font-size: 18px;
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.8);
            letter-spacing: 1px;
            white-space: nowrap;
            /* 標籤也要反向旋轉以保持正面 */
            animation: billboardCounter 25s linear infinite;
        }

        /* 核心正面技術：每張卡片的起始角度需補償其父層位置 */
        @keyframes billboardCounter {
            /* 這裡透過 CSS 繼承，瀏覽器會自動處理相對於父層的補償 */
            from { transform: rotateY(0deg); }
            to { transform: rotateY(-360deg); }
        }

        /* 針對個別位置微調，確保圖片起始就面對你 */
        .p1 img, .p1 .product-label { animation-delay: 0s; }
        .p2 img, .p2 .product-label { animation-delay: -5s; }
        .p3 img, .p3 .product-label { animation-delay: -10s; }
        .p4 img, .p4 .product-label { animation-delay: -15s; }
        .p5 img, .p5 .product-label { animation-delay: -20s; }

        /* --- 5. Demo Section --- */
        .demo-section {
            background: #000;
            padding: 80px 8%;
            text-align: center;
            border-top: 1px solid rgba(96, 165, 250, 0.2);
        }

        .demo-section h3 {
            font-size: 28px;
            margin-bottom: 25px;
            color: #60a5fa;
            letter-spacing: 1.5px;
        }

        .demo-btn {
            display: inline-block;
            padding: 12px 35px;
            border: 1px solid #60a5fa;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .demo-btn:hover {
            background: #60a5fa;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.6);
        }

        /* --- 6. Footer --- */
        footer { 
            background: #000;
            padding: 60px 8% 30px 8%; 
            color: white; 
        }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .footer-section h4 { color: #60a5fa; margin-bottom: 20px; text-transform: uppercase; }
        .footer-section p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.6; }
        .copyright { text-align: center; padding-top: 40px; color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); }

        @media (max-width: 768px) {
            .orbit-ring { width: 500px; height: 500px; margin-left: -250px; margin-top: -250px; }
            .p1, .p2, .p3, .p4, .p5 { transform: rotateY(var(--angle)) translateZ(250px); }
            .product-card { width: 180px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Urmet Logo">
        </div>
        <div class="nav-wrapper">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">About Us</a></li>
                </ul>
            </nav>
            <button class="lang-btn">LANGUAGE ▾</button>
        </div>
    </header>

    <main class="stars-container">
        <div class="orbit-ring"></div>

        <div class="stage">
            <div class="carousel">
                <div class="product-card p1">
                    <img src="product1.png" alt="QR Code Access Control">
                    <div class="product-label">QR Code Access Control</div>
                </div>
                <div class="product-card p2">
                    <img src="product2.png" alt="Invitation">
                    <div class="product-label">Invitation</div>
                </div>
                <div class="product-card p3">
                    <img src="product3.png" alt="Facility Booking">
                    <div class="product-label">Facility Booking</div>
                </div>
                <div class="product-card p4">
                    <img src="product4.png" alt="URMET PLUS">
                    <div class="product-label">URMET PLUS</div>
                </div>
                <div class="product-card p5">
                    <img src="product5.png" alt="Panic Alarm">
                    <div class="product-label">Panic Alarm</div>
                </div>
            </div>
        </div>
    </main>

    <section class="demo-section">
        <h3>如有興趣，歡迎找我們做 demo</h3>
        <a href="mailto:info@urmet.com.hk" class="demo-btn">Book a Demo</a>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="logo.png" alt="Logo" style="height: 35px; margin-bottom: 20px;">
                <p>香港柴灣永泰道60號<br>柴灣工業城一期7期11-14室</p>
            </div>
            <div class="footer-section">
                <h4>Contact Us</h4>
                <p>Email: info@urmet.com.hk</p>
                <p>Tel: +852 2388 2388</p>
            </div>
        </div>
        <div class="copyright">
            <p>© 2026 URMET JES LIMITED - ALL RIGHTS RESERVED</p>
        </div>
    </footer>

</body>
</html>
