<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Products - URMET PLUS</title>
    
    <style>
        /* --- 1. 字體與基礎設定 --- */
        @font-face {
            font-family: 'Bariol Bold';
            src: url('fonts/Bariol-Bold.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020617; /* 更深邃的太空底色 */
            color: white;
            font-family: 'Bariol Bold', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 2. Header (保留) --- */
        header {
            width: 100%; 
            padding: 12px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: fixed; 
            top: 0; 
            left: 0; 
            background: radial-gradient(circle at 60% 40%, #1e4b8a 0%, #0a1931 50%, #020617 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo img { height: 40px; width: auto; transform: translateX(-38px); }
        .nav-wrapper { display: flex; align-items: center; gap: 30px; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav a { text-decoration: none; color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; color: #60a5fa; }
        .lang-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        /* --- 3. 太空漸變背景與 3D 展現區 --- */
        .stars-container {
            position: relative;
            width: 100%;
            height: 90vh; /* 稍微縮小高度以配合下方 Section */
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        /* 3D 旋轉舞台 */
        .stage {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-10deg); /* 輕微側面傾斜 */
        }

        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotateCarousel 25s linear infinite;
        }

        @keyframes rotateCarousel {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .product-card {
            position: absolute;
            width: 400px; /* 放大相片尺寸 */
            height: 250px;
            left: 50%;
            top: 55%;
            margin-left: -200px;
            margin-top: -125px;
            transform-style: preserve-3d;
        }

        /* 縮小半徑：從 450px 縮小至 350px，讓相片更靠近中心 */
        .p1 { transform: rotateY(0deg) translateZ(350px); }
        .p2 { transform: rotateY(90deg) translateZ(350px); }
        .p3 { transform: rotateY(180deg) translateZ(350px); }
        .p4 { transform: rotateY(270deg) translateZ(350px); }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 確保產品圖片不變形且無外框 */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            /* 反向旋轉：讓圖片永遠面向觀眾 */
            animation: keepFacing 25s linear infinite;
        }

        @keyframes keepFacing {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(-360deg); }
        }

        /* --- 4. Demo Section --- */
        .demo-section {
            background: #020617;
            padding: 100px 8%;
            text-align: center;
            border-top: 1px solid rgba(96, 165, 250, 0.1);
        }

        .demo-section h3 {
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #f8fafc;
        }

        .demo-btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 16px;
            color: white;
            text-decoration: none;
            border: 1px solid #60a5fa;
            border-radius: 30px;
            transition: all 0.3s ease;
            background: rgba(96, 165, 250, 0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .demo-btn:hover {
            background: #60a5fa;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.4);
            transform: translateY(-3px);
        }

        /* --- 5. Footer (保留) --- */
        footer { 
            background: #020617;
            padding: 80px 8% 40px 8%; 
            color: white; 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .footer-section h4 { color: #60a5fa; margin-bottom: 20px; font-size: 18px; text-transform: uppercase; }
        .footer-section p, .footer-section a { color: rgba(255,255,255,0.6); text-decoration: none; display: block; margin-bottom: 10px; font-size: 15px; }
        .copyright { text-align: center; padding-top: 60px; color: rgba(255,255,255,0.2); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }

        @media (max-width: 768px) {
            .logo img { transform: none; }
            header nav { display: none; }
            .product-card { width: 280px; height: 180px; margin-left: -140px; }
            .p1, .p2, .p3, .p4 { transform: rotateY(var(--ry)) translateZ(200px); } /* 手機版半徑更小 */
            .demo-section h3 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Urmet Logo">
        </div>
        <div class="nav-wrapper">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">About Us</a></li>
                </ul>
            </nav>
            <div class="lang-container">
                <button class="lang-btn">LANGUAGE ▾</button>
            </div>
        </div>
    </header>

    <main class="stars-container">
        <div class="stage">
            <div class="carousel">
                <div class="product-card p1">
                    <img src="product1.png" alt="Product 1">
                </div>
                <div class="product-card p2">
                    <img src="product2.png" alt="Product 2">
                </div>
                <div class="product-card p3">
                    <img src="product3.png" alt="Product 3">
                </div>
                <div class="product-card p4">
                    <img src="product4.png" alt="Product 4">
                </div>
            </div>
        </div>
    </main>

    <section class="demo-section">
        <h3>如有興趣，歡迎找我們做 demo</h3>
        <a href="mailto:info@urmet.com.hk" class="demo-btn">Contact Our Team</a>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="logo.png" alt="Logo" style="height: 35px; margin-bottom: 20px;">
                <p>香港柴灣永泰道60號<br>柴灣工業城一期7期11-14室</p>
            </div>
            <div class="footer-section">
                <h4>Contact Us</h4>
                <a href="#">Help Desk</a>
                <a href="privacy.html">Privacy Policy</a>
                <a href="#">Terms of Service</a>
            </div>
        </div>
        <div class="copyright">
            <p>© 2026 URMET JES LIMITED - ALL RIGHTS RESERVED</p>
        </div>
    </footer>

</body>
</html>
