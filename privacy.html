<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Privacy Policy - URMET PLUS</title>
    <style>
        /* --- 1. Font Integration --- */
        @font-face {
            font-family: 'Bariol Bold';
            src: url('fonts/Bariol-Bold.woff2') format('woff2'),
                 url('fonts/Bariol-Bold.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        /* --- 2. Global Styles --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #ffffff;
            font-family: 'Bariol Bold', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* --- 3. Header (Synced with About/Product) --- */
        header {
            width: 100%; 
            padding: 12px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: fixed; 
            top: 0; 
            left: 0; 
            background: radial-gradient(circle at 60% 40%, #1e4b8a 0%, #0a1931 50%, #050c1a 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header.hide {
            transform: translateY(-100%);
        }

        .logo img { 
            height: 40px; 
            width: auto; 
            display: block; 
            transform: translateX(-38px); 
        }

        .nav-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 30px; 
            height: 100%; 
        }
        
        nav {
            position: relative;
            display: flex;
            align-items: center;
            height: 40px; 
        }

        nav ul { list-style: none; display: flex; gap: 30px; }
        
        nav a { 
            text-decoration: none; 
            color: white; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            opacity: 0.8; 
            transition: 0.3s; 
        }

        nav a:hover { opacity: 1; color: #60a5fa; }

        /* --- Mobile Menu Elements --- */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 2001;
        }

        .hamburger span {
            width: 30px;
            height: 2px;
            background: white;
            transition: 0.3s;
        }

        .mobile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 60% 40%, #1e4b8a 0%, #0a1931 50%, #050c1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.5s;
        }

        .mobile-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .mobile-overlay ul {
            list-style: none;
            text-align: center;
        }

        .mobile-overlay ul li {
            margin: 25px 0;
        }

        .mobile-overlay ul li a {
            color: white;
            text-decoration: none;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* --- 4. White Middle Section --- */
        .white-content-wrapper {
            background: #ffffff;
            padding-top: 140px; 
            color: #0a1931;
        }

        .page-header {
            padding: 60px 10% 120px 10%; /* Increased bottom padding to 120px for more space */
            text-align: center;
        }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 0 10% 100px 10%; 
        }
        
        h1 { color: #0a1931; font-size: clamp(32px, 5vw, 56px); margin-bottom: 10px; letter-spacing: -1px; }
        .subtitle { color: #007aff; margin-bottom: 40px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        
        .download-box {
            display: flex; gap: 20px; margin-top: 30px; justify-content: center; flex-wrap: wrap;
        }
        .pdf-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 28px; background: #007aff; color: white;
            text-decoration: none; border-radius: 30px; transition: 0.3s;
            font-size: 14px; font-weight: bold;
        }
        .pdf-btn:hover { background: #0a1931; transform: translateY(-3px); }

        section { 
            margin-bottom: 50px; 
            background: #f8f9fa; 
            padding: 35px; 
            border-radius: 20px;
            border: 1px solid #eee;
        }
        h2 { color: #007aff; font-size: 22px; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
        p { color: #444; font-size: 17px; }

        /* --- 5. Footer --- */
        footer { 
            background: radial-gradient(circle at 60% 40%, #1e4b8a 0%, #0a1931 50%, #050c1a 100%);
            padding: 80px 8% 40px 8%; 
            color: white; 
        }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .footer-section h4 { color: #60a5fa; margin-bottom: 20px; font-size: 18px; text-transform: uppercase; }
        .footer-section p, .footer-section a { color: rgba(255,255,255,0.7); text-decoration: none; display: block; margin-bottom: 10px; font-size: 15px; }
        .footer-section a:hover { color: white; }
        .copyright { text-align: center; padding-top: 60px; color: rgba(255,255,255,0.3); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px; }

        @media (max-width: 900px) {
            .logo img { transform: none; }
            nav { display: none; }
            .hamburger { display: flex; }
            .white-content-wrapper { padding-top: 100px; }
            .page-header { padding-bottom: 80px; }
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="logo">
            <img src="logo.png" alt="Urmet Logo">
        </div>
        <div class="nav-wrapper">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">Contact Us</a></li>
                </ul>
            </nav>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <div class="mobile-overlay" id="mobileOverlay">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">Contact Us</a></li>
        </ul>
    </div>

    <div class="white-content-wrapper">
        <div class="page-header">
            <h1>Privacy Policy</h1>
            <p class="subtitle">私隱政策 • LAST UPDATED: APRIL 2026</p>
            
            <div class="download-box">
                <a href="privacy-en.html" class="pdf-btn">View English PDF</a>
                <a href="privacy-zh.html" class="pdf-btn">查看中文版 PDF</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="logo.png" alt="Logo" style="height: 35px; margin-bottom: 20px;">
                <p>Units 11-14, 7/F, Chai Wan Industrial City Phase 1<br>60 Wing Tai Road, Chai Wan, Hong Kong</p>
            </div>
            <div class="footer-section">
                <a href="about.html">Contact Us</a>
            </div>
        </div>
        <div class="copyright">
            <p>© 2026 URMET JES LIMITED - ALL RIGHTS RESERVED</p>
        </div>
    </footer>

    <script>
        const header = document.getElementById('mainHeader');
        const hamburger = document.getElementById('hamburger');
        const mobileOverlay = document.getElementById('mobileOverlay');
        
        // Hide/Show Header on Scroll
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('hide');
            } else {
                header.classList.remove('hide');
            }
        });

        // Hamburger Menu Toggle
        hamburger.addEventListener('click', () => {
            mobileOverlay.classList.toggle('active');
            document.body.style.overflow = mobileOverlay.classList.contains('active') ? 'hidden' : 'auto';
            
            const spans = hamburger.querySelectorAll('span');
            if(mobileOverlay.classList.contains('active')) {
                spans[0].style.transform = 'rotate(45deg) translate(5px, 6px)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'rotate(-45deg) translate(5px, -6px)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        });
    </script>

</body>
</html>
