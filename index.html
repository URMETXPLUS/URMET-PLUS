<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URMET - ONYX Video Door Phone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 全域設定 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1931 0%, #001f4d 50%, #003366 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- 頁首導覽列 --- */
        header {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(10, 25, 49, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo img {
            height: 40px;
            width: auto;
            display: block;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            transition: color 0.3s;
        }

        nav a:hover { color: #60a5fa; }

        /* --- 主要內容區塊 --- */
        main {
            padding: 150px 50px 100px;
            flex: 1; /* 讓內容撐開，確保 footer 在底部 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .main-title { font-size: 56px; font-weight: 700; line-height: 1.1; margin-bottom: 10px; }

        .learn-more-btn {
            background-color: #3b82f6;
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            max-width: 180px;
        }

        .product-image {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        /* --- 頁腳 Footer (參考附圖設計) --- */
        footer {
            background: rgba(0, 0, 0, 0.3); /* 深色透明感 */
            padding: 60px 50px 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 50px;
        }
