<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URMET - ONYX Video Door Phone</title>

    <style>
        /* --- 全域設定 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1931 0%, #001f4d 50%, #003366 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- 頁首 --- */
        header {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(10, 25, 49, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        /* --- 主要內容 --- */
        main {
            padding: 150px 50px 100px;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .hero-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .main-title { font-size: 56px; font-weight: 700; line-height: 1.1; margin-bottom: 20px; }

        .product-image {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        /* --- Footer：調整為左方截圖的淺藍/紫色漸變 --- */
        footer {
            /* 使用左方圖示中的紫色到亮藍色的漸變效果 */
            background: linear-gradient(135deg, #2b1a6b 0%, #3d2bb2 40%, #1e56d4 100%);
            padding: 80px 50px 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .footer-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 控制 Logo 為 3cm x 3cm */
        .footer-logo {
            width: 114px;
            height: 114px;
            object-fit: contain;
            margin-bottom: 15px;
            background-color: black; /* 配合你右圖 Logo 的黑色背景底 */
            padding: 10px;
            border-radius: 8px;
        }

        .footer-section h4 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .footer-section p, .footer-section a {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            line-height: 1.6;
        }

        .footer-section a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        .social-icons {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 60px auto 0;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .footer-content { flex-direction: column; align-items: center; text-align: center; gap: 40px; }
        }
    </style>
</head>
