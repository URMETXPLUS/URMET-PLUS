<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URMET PLUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 全域設定 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 主背景漸變 */
            background: linear-gradient(135deg, #0a1931 0%, #001f4d 50%, #003366 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- 頁首導覽列 --- */
        header {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(10, 25, 49, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo img {
            height: 40px;
            width: auto;
            display: block;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            transition: color 0.3s;
        }

        nav a:hover { color: #60a5fa; }

        /* --- 主要內容區塊 --- */
        main {
            padding: 150px 50px 100px;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 確保主區塊至少佔滿一屏 */
        }

        .hero-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .main-title { font-size: 56px; font-weight: 700; line-height: 1.1; margin-bottom: 10px; }

        .learn-more-btn {
            background-color: #3b82f6;
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            max-width: 180px;
        }

        .product-image {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        /* --- 頁腳 Footer (簡化版 + 漸變色) --- */
        footer {
            /* 頁腳專屬漸變色：從深藍到深紫，增加層次感 */
            background: linear-gradient(to bottom, transparent, rgba(10, 25, 49, 0.9), #050c1a);
            padding: 80px 50px 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between; /* 左右對開，符合簡化設計 */
            align-items: flex-start;
        }

        .footer-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .footer-section h4 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #60a5fa; /* 標題用藍色突出 */
        }

        .footer-section p, .footer-section a {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            line-height: 1.6;
        }

        .footer-section a:hover {
            color: white;
            text-decoration: underline;
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 60px auto 0;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        /* --- 響應式設定 --- */
        @media (max-width: 768px) {
            .hero-container { grid-template-columns: 1fr; text-align: center; }
            .footer-content { flex-direction: column; align-items: center; text-align: center; gap: 40px; }
            header nav { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <img src="logo.png" alt="Urmet Logo">
        </a>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Use cases</a></li>
                <li><a href="#">Tools</a></li>
                <li><a href="#">Services</a></li>
            </ul>
        </nav>
        <div style="font-size: 13px; color: rgba(255,255,255,0.7);">Product Search</div>
    </header>

    <main>
        <div class="hero-container">
            <div class="text-section">
                <p style="color: #60a5fa; text-transform: uppercase; font-weight: 600; letter-spacing: 2px;">Multi-reader</p>
                <h1 class="main-title">TESTING</h1>
                <p style="color: rgba(255, 255, 255, 0.8); font-size: 18px; line-height: 1.6; margin-bottom: 20px;">
                    體驗全新世代的門禁科技，MULT 以極簡設計融合先進 IP 技術。
                </p>
                <a href="#" class="learn-more-btn">Learn more →</a>
            </div>
            <div style="text-align: center;">
                <img src="reader.png" alt="Urmet ONYX Reader" class="product-image">
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="logo.png" alt="Urmet Logo" style="height: 30px; margin-bottom: 10px;">
                <p>香港柴灣永泰道60號<br>柴灣工業城一期7期11-14室</p>
                <div style="display: flex; gap: 15px; margin-top: 10px; font-size: 18px;">
                    <span>f</span> <span>in</span> <span>y</span> <span>i</span>
                </div>
            </div>

            <div class="footer-section">
                <h4>Contact Us</h4>
                <a href="#">Help Desk</a>
                <a href="#">Privacy Policy</a>
            </div>
        </div>

        <div class="footer-bottom">
            <p>© 2026 URMET JES LIMITED - All rights reserved</p>
        </div>
    </footer>

</body>
</html>
